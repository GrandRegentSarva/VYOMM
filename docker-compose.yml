services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SQLITE_PATH: /data/vyomm.db
      GROQ_API_KEY: ${GROQ_API_KEY:-demo-mode}
      GROQ_BASE_URL: https://api.groq.com/openai/v1
      GROQ_MODEL: llama-3.3-70b-versatile
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      RUNBOOK_PATH: /app/runbooks
    volumes:
      - sqlite_data:/data
    depends_on:
      chromadb:
        condition: service_started
    networks:
      - vyomm

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    networks:
      - vyomm

  chromadb:
    image: chromadb/chroma:0.5.23
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - vyomm

  simulator:
    build:
      context: .
      dockerfile: simulator/Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - vyomm

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - vyomm

networks:
  vyomm:
    driver: bridge

volumes:
  sqlite_data:
  chroma_data:
